name: BillBoy CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  FLUTTER_VERSION: '3.19.0'
  NODE_VERSION: '20'

jobs:
  # ─── Backend Tests ─────────────────────────────────────────────────
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: billboy_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: billboy_backend/package-lock.json

      - name: Install dependencies
        working-directory: billboy_backend
        run: npm ci

      - name: Run tests
        working-directory: billboy_backend
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: billboy_test
          DB_USER: postgres
          DB_PASSWORD: password
          JWT_SECRET: test-secret-key-for-ci
        run: npm test

  # ─── Flutter Tests ──────────────────────────────────────────────────
  flutter-test:
    name: Flutter Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: billboy_app
        run: flutter pub get

      - name: Analyze code
        working-directory: billboy_app
        run: flutter analyze

      - name: Run unit tests
        working-directory: billboy_app
        run: flutter test --coverage

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          file: billboy_app/coverage/lcov.info

  # ─── Build Android ─────────────────────────────────────────────────
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: flutter-test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: billboy_app
        run: flutter pub get

      - name: Build APK
        working-directory: billboy_app
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: billboy-android
          path: billboy_app/build/app/outputs/flutter-apk/app-release.apk

  # ─── Build iOS ──────────────────────────────────────────────────────
  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest
    needs: flutter-test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: billboy_app
        run: flutter pub get

      - name: Build iOS (no code sign)
        working-directory: billboy_app
        run: flutter build ios --release --no-codesign

  # ─── Deploy Backend ─────────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: [backend-test, build-android]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build & Push Docker Image
        run: |
          echo ${{ secrets.DOCKER_PASSWORD }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin
          docker build -t billboy/api:${{ github.sha }} -t billboy/api:latest billboy_backend/
          docker push billboy/api:${{ github.sha }}
          docker push billboy/api:latest

      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/billboy
            docker compose pull api
            docker compose up -d api
            docker system prune -f
