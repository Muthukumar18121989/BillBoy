name: billboy
description: AI-Powered Digital Bill & Warranty Manager
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  get_it: ^7.6.4

  # Navigation
  go_router: ^12.1.3

  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.15.3
  firebase_messaging: ^14.7.10
  firebase_storage: ^11.5.6
  cloud_firestore: ^4.13.6

  # HTTP & API
  dio: ^5.4.0
  retrofit: ^4.0.3

  # Local Storage
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  sqflite: ^2.3.0

  # UI Components
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  lottie: ^2.7.0
  fl_chart: ^0.66.0
  table_calendar: ^3.0.9
  intl: ^0.19.0
  timeago: ^3.6.0

  # Camera & Files
  camera: ^0.10.5+9
  image_picker: ^1.0.7
  file_picker: ^6.1.1
  permission_handler: ^11.1.0
  image_cropper: ^5.0.1
  path_provider: ^2.1.2
  image: ^4.1.4

  # PDF
  printing: ^5.12.0
  pdf: ^3.10.7
  pdfx: ^2.5.0

  # OCR & AI
  google_mlkit_text_recognition: ^0.11.0

  # Notifications
  flutter_local_notifications: ^16.3.2

  # Security
  flutter_secure_storage: ^9.0.0
  crypto: ^3.0.3
  local_auth: ^2.1.8

  # Utils
  uuid: ^4.3.3
  connectivity_plus: ^5.0.2
  package_info_plus: ^5.0.1
  url_launcher: ^6.2.2
  share_plus: ^7.2.1
  open_file: ^3.3.2
  csv: ^5.1.1
  excel: ^4.0.2
  photo_view: ^0.14.0
  pinput: ^3.0.1
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^5.0.0
  flutter_animate: ^4.4.0
  shimmer_animation: ^2.2.1
  badges: ^3.1.2
  dotted_border: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  retrofit_generator: ^8.0.6
  hive_generator: ^2.0.1
  json_annotation: ^4.8.1
  json_serializable: ^6.7.1
  mockito: ^5.4.4
  bloc_test: ^9.1.6

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/fonts/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
