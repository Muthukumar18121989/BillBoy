name: billboy
description: AI-Powered Digital Bill & Warranty Manager
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  get_it: ^7.6.4

  # Navigation
  go_router: ^12.1.3

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  firebase_messaging: ^15.1.3
  firebase_storage: ^12.3.2
  cloud_firestore: ^5.4.4

  # HTTP & API
  dio: ^5.4.0

  # Local Storage
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # UI Components
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  fl_chart: ^0.66.0
  intl: ^0.19.0
  timeago: ^3.6.0

  # Camera & Files
  image_picker: ^1.0.7
  permission_handler: ^11.1.0
  path_provider: ^2.1.2

  # Notifications
  flutter_local_notifications: ^17.2.4
  timezone: ^0.9.4

  # Security
  flutter_secure_storage: ^9.0.0
  crypto: ^3.0.3
  local_auth: ^2.1.8

  # Utils
  uuid: ^4.3.3
  connectivity_plus: ^6.1.0
  package_info_plus: ^9.0.1
  url_launcher: ^6.2.2
  share_plus: ^10.0.0
  csv: ^5.1.1
  google_sign_in: ^6.2.1
  flutter_animate: ^4.4.0
  badges: ^3.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/.gitkeep
    - assets/icons/.gitkeep
    - assets/animations/.gitkeep
